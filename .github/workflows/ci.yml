name: CI

on:
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  format:
    name: Terraform Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      - name: Terraform Validate
        run: make validate

  docs:
    name: Documentation Freshness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform Docs
        run: |
          TFDOCS_VERSION="v0.21.0"
          TFDOCS_PKG="terraform-docs-${TFDOCS_VERSION}-linux-amd64.tar.gz"
          curl -sSLo "${TFDOCS_PKG}" "https://github.com/terraform-docs/terraform-docs/releases/download/${TFDOCS_VERSION}/${TFDOCS_PKG}"
          curl -sSLo terraform-docs.sha256sum "https://github.com/terraform-docs/terraform-docs/releases/download/${TFDOCS_VERSION}/terraform-docs-${TFDOCS_VERSION}.sha256sum"
          grep "${TFDOCS_PKG}" terraform-docs.sha256sum | sha256sum -c
          tar -xzf "${TFDOCS_PKG}" terraform-docs
          chmod +x terraform-docs
          sudo mv terraform-docs /usr/local/bin/
          rm -f "${TFDOCS_PKG}" terraform-docs.sha256sum

      - name: Generate Docs
        run: |
          terraform-docs .
          for dir in examples/*/; do
            terraform-docs "$dir"
          done

      - name: Check for Changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::Documentation is out of date. Run 'terraform-docs' for root and example directories, then commit the changes."
            exit 1
          fi

  security:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Trivy IaC Scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "0"
          version: "v0.69.3"

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      - name: Run Unit Tests
        run: make test-unit

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Skip on forked PRs (secrets are unavailable in that context)
    if: vars.ENABLE_INTEGRATION_TESTS == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      - name: Preflight - verify required secrets
        run: |
          missing=()
          [ -z "$POWER_PLATFORM_TENANT_ID" ] && missing+=("POWER_PLATFORM_TENANT_ID")
          [ -z "$POWER_PLATFORM_CLIENT_ID" ]  && missing+=("POWER_PLATFORM_CLIENT_ID")
          [ -z "$ARM_TENANT_ID" ]             && missing+=("ARM_TENANT_ID")
          [ -z "$ARM_CLIENT_ID" ]             && missing+=("ARM_CLIENT_ID")
          [ -z "$ARM_SUBSCRIPTION_ID" ]       && missing+=("ARM_SUBSCRIPTION_ID")
          [ -z "$TF_VAR_environments" ]       && missing+=("TF_VAR_ENVIRONMENTS")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Configure these as repository secrets. See tests/README.md for details."
            exit 1
          fi
        env:
          POWER_PLATFORM_TENANT_ID: ${{ secrets.POWER_PLATFORM_TENANT_ID }}
          POWER_PLATFORM_CLIENT_ID: ${{ secrets.POWER_PLATFORM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_environments: ${{ secrets.TF_VAR_ENVIRONMENTS }}

      - name: Run Integration Tests
        run: make test-integration
        env:
          ARM_USE_OIDC: "true"
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          POWER_PLATFORM_USE_OIDC: "true"
          POWER_PLATFORM_TENANT_ID: ${{ secrets.POWER_PLATFORM_TENANT_ID }}
          POWER_PLATFORM_CLIENT_ID: ${{ secrets.POWER_PLATFORM_CLIENT_ID }}
          TF_VAR_environments: ${{ secrets.TF_VAR_ENVIRONMENTS }}
